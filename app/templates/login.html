<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <!-- Bootstrap para estilização da página -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-header text-center">

                    <h4>Agenda Médica</h4>

                </div>

                <div class="card-body">

                    <!-- Exibe mensagens de sucesso ou erro enviadas pelo Flask -->
                    {% with messages = get_flashed_messages(with_categories=true) %}

                        {% if messages %}

                            {% for category, message in messages %}

                                <div class="alert alert-{{ category }}">

                                    {{ message }}

                                </div>

                            {% endfor %}

                        {% endif %}

                    {% endwith %}

                    <!-- Formulário de autenticação -->
                    <form method="POST" action="/login">

                        <div class="mb-3">

                            <label class="form-label">

                                E-mail

                            </label>

                            <input
                                    type="email"
                                    class="form-control"
                                    name="email"
                                    required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Senha

                            </label>

                            <input
                                    type="password"
                                    class="form-control"
                                    name="password"
                                    required>

                        </div>

                        <button
                                class="btn btn-primary w-100">

                            Entrar

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
